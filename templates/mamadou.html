<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mamadou Sy | AWS App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 15px;
            font-size: 2.5em;
        }

        p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .status {
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 8px;
            background-color: #28a745;
            display: inline-block;
            font-weight: bold;
        }

        footer {
            margin-top: 25px;
            font-size: 0.9em;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚀 Application AWS Déployée</h1>
        
        <p>
            Si vous voyez cette page, le routing Flask fonctionne correctement
            et votre application est en ligne.
        </p>

        <div class="status">
            ✅ Service opérationnel
        </div>

        <footer>
            © 2026 Mamadou Sy | Projet DevOps & CI/CD
        </footer>
    </div>

</html>
